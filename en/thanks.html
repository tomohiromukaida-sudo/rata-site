<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You for Registering — RATA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    background: #061820; color: #fff;
    max-width: 430px; margin: 0 auto;
    min-height: 100svh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  .icon {
    width: 100%; max-width: 320px; height: 180px; border-radius: 16px;
    overflow: hidden; margin-bottom: 28px;
  }
  .icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
  h1 { font-size: 22px; font-weight: 300; margin-bottom: 16px; line-height: 1.4; }
  h1 strong { font-weight: 600; }
  p { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.8; margin-bottom: 28px; max-width: 320px; }
  a.btn {
    display: inline-block; background: #2E9BB5; color: #fff; font-size: 12px;
    letter-spacing: 1px; padding: 13px 28px; border-radius: 100px; text-decoration: none;
    text-transform: uppercase;
  }
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CVPHRXDS44"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CVPHRXDS44');
</script>
<!-- Meta Pixel
     配信開始前に PIXEL_ID を実際のMeta Pixel IDに差し替えること。
     未設定のままだとfbqは無効化され、計測されない（エラーにはならない）。 -->
<script>
  var META_PIXEL_ID = 'REPLACE_WITH_PIXEL_ID';
  if (META_PIXEL_ID && META_PIXEL_ID.indexOf('REPLACE_WITH') === -1) {
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', META_PIXEL_ID);
    fbq('track', 'PageView');
  }
</script>
<noscript>
  <img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=REPLACE_WITH_PIXEL_ID&ev=PageView&noscript=1" />
</noscript>
</head>
<body>
  <div class="icon"><img src="../images/thanks-hero.jpg" alt="Ocean Gaia underwater sculpture"></div>
  <h1>Thank you for <strong>registering</strong></h1>
  <p>
    We've received your RATA Pass pre-registration. A confirmation email is on its way — please check your inbox.<br><br>
    We'll give you priority updates as the official launch approaches.
  </p>
  <a href="/en/" class="btn">Back to Home</a>
<script src="../js/tracking.js"></script>
<script>
  if (typeof gtag === 'function') {
    gtag('event', 'generate_lead', { event_category: 'pre_registration' });
  }
  if (window.RataTracking) {
    window.RataTracking.pushEvent('thank_you_view', {});
  }
</script>
</body>
</html>
